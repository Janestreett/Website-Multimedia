<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik 3 - Website Multimedia</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #F4F7F6;
            --bg-surface: #FFFFFF;
            --primary-navy: #0A2540;
            --text-main: #2D3748;
            --text-muted: #718096;
            --border-color: #E2E8F0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .multimedia-container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .page-header { text-align: center; margin-bottom: 1rem; }
        .page-header h1 { font-family: 'Montserrat', sans-serif; color: var(--primary-navy); }

        .media-card {
            background-color: var(--bg-surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02), 0 10px 20px rgba(10, 37, 64, 0.06);
            border: 1px solid var(--border-color);
        }

        .media-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            color: var(--primary-navy);
            margin-bottom: 1.5rem;
        }

        audio { width: 100%; border-radius: 8px; }

        .iframe-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="multimedia-container">
        
        <div class="page-header">
            <h1>Platform Multimedia</h1>
            <p>Tugas Praktik 3 | Disusun oleh: Akmal Fahreza</p>
        </div>

       <main>
            <!-- Audio -->
            <section>
                <h2> Audio</h2>
                <div class="media-container">
                    <audio controls>
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                    </audio>
                    <p class="description"></p>
                </div>
            </section>


        <div class="media-card">
            <h2>Video : How The Economic Machine Works</h2>
            <div class="iframe-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/PHe0bXAIuk0" 
                    title="How The Economic Machine Works by Ray Dalio" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
</div>
</body>
</html>
